<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{HERO_META_DESCRIPTION}}">
    <title>{{BRAND}} — {{HERO_HEADLINE}}</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js" defer></script>
  </head>
  <body class="hero-page">
    <header class="site-header">
      <a class="wordmark" href="/" aria-label="{{BRAND}} home">{{BRAND}}</a>
      <span class="header-note">{{HEADER_NOTE}}</span>
    </header>

    <main class="hero" aria-labelledby="page-title">
      <p class="cycle" aria-label="the continuity cycle: act, record, reflect, continue">
        <span>act</span><span>→</span><span>record</span><span>→</span><span>reflect</span><span>→</span><span>continue</span>
      </p>
      <h1 id="page-title">{{HERO_HEADLINE}}</h1>
      <p class="lede hero-lede">
        {{HERO_LEDE}}
      </p>

      <div class="command-block">
        <code class="command-line" id="oneshot-command" data-oneshot-command>{{ONESHOT_COMMAND}}</code>
        <button
          class="copy-button"
          type="button"
          hidden
          data-copy-command
          data-copied-label="{{HERO_COPIED_LABEL}}"
          aria-describedby="oneshot-command"
        >{{HERO_COPY_LABEL}}</button>
      </div>

      <ol class="hero-steps">
        <li>{{HERO_STEP_1}}</li>
        <li>{{HERO_STEP_2}}</li>
        <li>{{HERO_STEP_3}}</li>
      </ol>

      <p class="command-note">
        {{HERO_REQUIREMENTS}}
      </p>

      <nav class="hero-links" aria-label="{{HERO_LINKS_ARIA_LABEL}}">
        <a href="{{REPOSITORY_URL}}" rel="noopener">{{HERO_REPO_LINK}}</a>
        <a href="/docs">{{HERO_DOCS_LINK}}</a>
        <a href="/privacy">{{PRIVACY_LINK}}</a>
      </nav>
    </main>

    <footer class="site-footer">
      <span>{{FOOTER_OPERATOR}}</span>
      <span>{{FOOTER_DOCTRINE}}</span>
    </footer>
  </body>
</html>
