<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; background: #f3eee3; }
  body {
    --paper: #f3eee3;
    --ink: #1d1c18;
    --muted: #646056;
    --accent: #bd3f24;
    --accent-dark: #8e2a16;
    display: flex;
    flex-direction: column;
    padding: 56px 64px 48px;
    background:
      linear-gradient(90deg, transparent calc(100% - 1px), rgb(29 28 24 / 5%) 1px) 0 0 / 64px 100%,
      var(--paper);
    color: var(--ink);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  .mono { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
  .top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 22px;
    border-bottom: 2px solid var(--ink);
  }
  .wordmark { font-size: 30px; font-weight: 800; letter-spacing: 0.24em; }
  .note { color: var(--muted); font-size: 17px; letter-spacing: 0.08em; }
  .middle { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .cycle { font-size: 22px; letter-spacing: 0.03em; margin-bottom: 26px; }
  .cycle .arrow { color: var(--accent); padding: 0 8px; }
  h1 {
    font-size: 84px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.02;
    max-width: 20ch;
  }
  .command {
    display: flex;
    align-items: stretch;
    margin-top: 44px;
    border: 2px solid var(--ink);
    background: rgb(255 252 245 / 62%);
    width: fit-content;
  }
  .command code {
    display: block;
    padding: 22px 30px;
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 25px;
    white-space: nowrap;
  }
  .command .chip {
    display: flex;
    align-items: center;
    padding: 0 30px;
    border-left: 2px solid var(--accent-dark);
    background: var(--accent);
    color: #fffaf0;
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 19px;
    font-weight: 750;
    letter-spacing: 0.08em;
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    padding-top: 22px;
    border-top: 1px solid var(--muted);
    color: var(--muted);
    font-size: 17px;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
  <div class="top">
    <span class="wordmark">TOHSENO</span>
    <span class="note mono">one command &middot; your agent &middot; your app</span>
  </div>
  <div class="middle">
    <p class="cycle mono">no logins<span class="arrow">&middot;</span>seed phrase identity<span class="arrow">&middot;</span>data on device</p>
    <h1>One command.<br>One sentence. One app.</h1>
    <div class="command">
      <code>curl -fsSL https://tohseno.com/oneshot.sh | bash</code>
      <span class="chip">COPY</span>
    </div>
  </div>
  <div class="bottom mono">
    <span>tohseno.com</span>
    <span>No accounts. No feeds. Yours from birth.</span>
  </div>
</body>
</html>
