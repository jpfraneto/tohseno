<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: "IBM Plex Mono";
    font-weight: 400;
    src: url("../public/fonts/plex-mono-latin.woff2") format("woff2");
  }
  * { box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; background: #11100e; }
  body {
    display: grid;
    padding: 44px 50px;
    grid-template-columns: 44% 56%;
    color: #ece9df;
    background:
      radial-gradient(circle at 16% 24%, rgb(236 233 223 / 5%) 0 .55px, transparent .8px) 0 0 / 7px 7px,
      radial-gradient(circle at 77% 64%, rgb(236 233 223 / 3%) 0 .5px, transparent .8px) 3px 4px / 11px 11px,
      #11100e;
    font-family: "Arial Black", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .copy {
    display: flex;
    padding: 22px 28px 18px 0;
    flex-direction: column;
    justify-content: space-between;
  }
  .wordmark {
    font-family: "IBM Plex Mono", Menlo, monospace;
    font-size: 26px;
    letter-spacing: .14em;
  }
  h1 {
    margin: 0;
    font-size: 91px;
    letter-spacing: -.075em;
    line-height: .84;
  }
  h1 span { color: #ff9d18; }
  .contact-sheet {
    display: grid;
    padding: 12px;
    grid-template-columns: repeat(4, 1fr);
    gap: 9px;
    border: 1px solid #45423b;
    background: #090908;
    transform: rotate(.65deg);
  }
  .frame {
    padding: 6px;
    border: 1px solid #35322c;
    background: #191815;
  }
  .frame i {
    display: block;
    margin-bottom: 4px;
    color: #77736b;
    font-family: "IBM Plex Mono", Menlo, monospace;
    font-size: 7px;
    font-style: normal;
    letter-spacing: .08em;
  }
  .frame img {
    display: block;
    width: 100%;
    aspect-ratio: 1;
    border-radius: 23%;
  }
</style>
</head>
<body>
  <section class="copy">
    <span class="wordmark">TOHSENO</span>
    <h1>GIVE<br>EVERY<br>IDEA<br>A <span>SHOT.</span></h1>
  </section>
  <section class="contact-sheet" aria-hidden="true">
    <span class="frame"><i>003</i><img src="../public/shot-icons/shot-003.webp" alt=""></span>
    <span class="frame"><i>014</i><img src="../public/shot-icons/shot-014.webp" alt=""></span>
    <span class="frame"><i>026</i><img src="../public/shot-icons/shot-026.webp" alt=""></span>
    <span class="frame"><i>039</i><img src="../public/shot-icons/shot-039.webp" alt=""></span>
    <span class="frame"><i>051</i><img src="../public/shot-icons/shot-051.webp" alt=""></span>
    <span class="frame"><i>058</i><img src="../public/shot-icons/shot-058.webp" alt=""></span>
    <span class="frame"><i>064</i><img src="../public/shot-icons/shot-064.webp" alt=""></span>
    <span class="frame"><i>068</i><img src="../public/shot-icons/shot-068.webp" alt=""></span>
    <span class="frame"><i>076</i><img src="../public/shot-icons/shot-076.webp" alt=""></span>
    <span class="frame"><i>078</i><img src="../public/shot-icons/shot-078.webp" alt=""></span>
    <span class="frame"><i>082</i><img src="../public/shot-icons/shot-082.webp" alt=""></span>
    <span class="frame"><i>087</i><img src="../public/shot-icons/shot-087.webp" alt=""></span>
    <span class="frame"><i>090</i><img src="../public/shot-icons/shot-090.webp" alt=""></span>
    <span class="frame"><i>094</i><img src="../public/shot-icons/shot-094.webp" alt=""></span>
    <span class="frame"><i>097</i><img src="../public/shot-icons/shot-097.webp" alt=""></span>
    <span class="frame"><i>100</i><img src="../public/shot-icons/shot-100.webp" alt=""></span>
  </section>
</body>
</html>
