<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: "Fraunces";
    font-weight: 100 900;
    src: url("../public/fonts/fraunces-latin.woff2") format("woff2");
  }
  @font-face {
    font-family: "IBM Plex Mono";
    font-weight: 400;
    src: url("../public/fonts/plex-mono-latin.woff2") format("woff2");
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; background: #F5F0E6; }
  body {
    --paper: #F5F0E6;
    --paper-deep: #EDE6D6;
    --ink: #2B2926;
    --stone: #8A8577;
    --seal: #B3341E;
    display: flex;
    flex-direction: column;
    padding: 48px 64px 44px;
    background-color: var(--paper);
    background-image:
      radial-gradient(circle at 18% 22%, rgba(43, 41, 38, .025) 0 .65px, transparent .85px),
      radial-gradient(circle at 72% 67%, rgba(43, 41, 38, .018) 0 .55px, transparent .8px);
    background-size: 7px 7px, 11px 11px;
    color: var(--ink);
    font-family: "Fraunces", Georgia, serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: "IBM Plex Mono", Menlo, monospace; font-weight: 400; }
  .top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .wordmark { font-size: 40px; letter-spacing: -.055em; }
  .reverse-note {
    color: var(--stone);
    font-size: 18px;
    transform: scaleX(-1);
  }
  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .eyebrow {
    color: var(--stone);
    font-size: 16px;
    letter-spacing: .08em;
    margin-bottom: 30px;
  }
  h1 {
    font-size: 108px;
    font-weight: 300;
    letter-spacing: -.065em;
    line-height: .94;
    margin-bottom: 42px;
  }
  .command-wrap {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 20px 28px;
    border-radius: 12px;
    background: var(--paper-deep);
  }
  .command-wrap code { font-family: "IBM Plex Mono", Menlo, monospace; font-size: 21px; }
  .command-wrap .copy { color: var(--stone); font-size: 16px; }
  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-top: 1px solid rgba(43, 41, 38, .18);
    padding-top: 22px;
    color: var(--stone);
    font-size: 15px;
  }
  .seal {
    display: grid;
    width: 40px;
    height: 40px;
    place-items: center;
    border: 1.5px solid var(--seal);
    border-radius: 7px;
    color: var(--seal);
    font-size: 27px;
    line-height: 1;
    transform: rotate(.7deg);
    font-family: "Fraunces", Georgia, serif;
  }
  .seal span { transform: scaleX(-1); }
</style>
</head>
<body>
  <div class="top">
    <span class="wordmark">tohseno</span>
    <span class="reverse-note mono">one conversation</span>
  </div>
  <div class="middle">
    <p class="eyebrow mono">one prompt to a running iOS app</p>
    <h1>Install. Run.<br>Tell your agent.</h1>
    <div class="command-wrap">
      <code>curl -fsSL https://tohseno.com/install.sh | bash</code>
      <span class="copy mono">copy</span>
    </div>
  </div>
  <div class="bottom mono">
    <span>tohseno.com &middot; install &middot; run &middot; tell your agent &middot; own the shot</span>
    <span class="seal"><span>t</span></span>
  </div>
</body>
</html>
