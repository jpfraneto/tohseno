# XcodeGen source of truth for the base app project.
# The committed Writing.xcodeproj is generated from this file:
#   xcodegen generate
# Regenerate after changing targets, sources, or build settings.
name: Writing
options:
  bundleIdPrefix: com.tohseno
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
targets:
  Writing:
    type: application
    platform: iOS
    sources:
      - App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID)
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: $(APP_DISPLAY_NAME)
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: Authenticate before showing or replacing your recovery phrase identity.
        RevenueCatPublicKey: $(REVENUECAT_PUBLIC_KEY)
        DevelopmentSecret: $(DEV_SECRET_FOR_BUILD)
        TohsenoAPIEnvironment: $(TOHSENO_API_ENVIRONMENT)
        TohsenoAPIBaseURL: $(TOHSENO_API_BASE_URL)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    preBuildScripts:
      - name: Validate production API endpoint
        basedOnDependencyAnalysis: false
        script: |
          "$SRCROOT/scripts/validate-production-endpoint.sh"
  WritingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Writing
schemes:
  Writing:
    build:
      targets:
        Writing: all
        WritingTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WritingTests
